<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portifólio Técnico</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <button id="themeToggle">Trocar Modo Escuro</button>

    <div class="profile-card">
        <img src="" alt="" id="photo-preview">
        <h2 id="display-name">Nome de Usuário</h2>
        <p id="display-bio">Sua biografia aparece aqui</p>

        <div class="upload-section">
            <label for="imageInput">Escolha sua Foto</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <hr>

        <form id="profileForm">
            <input type="text" id="nameInput" placeholder="Digite seu nome">
            <textarea id="bioInput" placeholder="Fale sobre você..."></textarea>
            <div id="char-count">Caracteres: 0</div>
            <button type="submit">Salvar Perfil</button>
        </form>

        <div id="projeto">
            <h3>Meus Projetos</h3>
            <div class="cards_projeto project-item">Projeto 1</div>
            <div class="cards_projeto project-item">Projeto 2</div>
            <div class="cards_projeto project-item">Projeto 3</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
